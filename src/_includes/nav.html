<div class="container-fluid navigation-fluid">
    <div class="row">
        <div class="col-md-12">
            <nav id="site-navigation" class="main-navigation navbar navbar-expand-lg navbar-light"
                 role="navigation">

                <!-- Logo - Left -->
                <div class="navbar-brand">
                    <a href="/" rel="home">
                        <img src="/images/nav/navbar-logo.webp"
                             alt="Bitcraze logo"
                             title="Bitcraze"/>
                    </a>
                </div>

                <!-- Hamburger toggler - Right on mobile -->
                <button type="button" class="navbar-toggler ms-auto"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbar-menu"
                        aria-controls="navbar-menu"
                        aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Collapsible content: store (mobile top) + menu items -->
                <div class="navbar-collapse collapse" id="navbar-menu">

                    <!-- Search bar: shown at top inside mobile menu only -->
                    <div class="navbar-mobile-search d-lg-none">
                        <form role="search" method="get" class="search-form w-100" action="/">
                            <label class="w-100">
                                <span class="sr-only">Search for:</span>
                                <input type="search"
                                       class="search-field form-control"
                                       placeholder="Search &hellip;"
                                       value="" name="s">
                            </label>
                            <button type="submit" class="search-submit">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <span class="sr-only">Search</span>
                            </button>
                        </form>
                    </div>

                    <!-- Store button: shown at top inside mobile menu only -->
                    <div class="navbar-mobile-store d-lg-none">
                        <a href="https://store.bitcraze.io/" class="btn btn-primary btn-color-secondary w-100">
                            <i class="fa-solid fa-cart-shopping fa-fw"></i> Store
                        </a>
                    </div>

                    <!-- Menu items - Center on desktop -->
                    <div class="navbar-menu-center">
                        {% include menu.html %}
                    </div>

                </div>

                <!-- Search + Store - Right on desktop only -->
                <div class="navbar-end d-none d-lg-flex ms-auto align-items-center">
                    <form role="search" method="get" class="search-form" action="/">
                        <label>
                            <span class="sr-only">Search for:</span>
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="search"
                                   class="search-field form-control"
                                   placeholder="Search &hellip;"
                                   value="" name="s">
                        </label>
                        <input type="submit" class="search-submit btn btn-primary" value="Search">
                    </form>
                    <a href="https://store.bitcraze.io/" class="btn btn-primary btn-color-secondary">
                        <i class="fa-solid fa-cart-shopping fa-fw"></i> Store
                    </a>
                </div>

            </nav>
        </div>
    </div>
</div>
