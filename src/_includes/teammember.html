{% assign member = include.member %}
{% assign role = include.role %}
{% assign bio = include.bio %}
{% assign img = include.img %}

<div class="row team">
    <div class="col-6 col-sm-3 col-md-3 offset-3 offset-sm-0">
        <img src="{{img}}" class="img-fluid d-block mx-auto" alt="Team members">
    </div>
    <div class="col-12 col-sm-9 col-md-8">
        <h2>{{member}}</h2>
        <h4 class="text-muted">{{role}}</h4> {{ bio | markdownify }}
    </div>
</div>
